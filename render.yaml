services:
  - type: web
    name: ai-engineering-os
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: DATABASE_URL
        value: sqlite:///aios.db
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
